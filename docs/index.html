<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>倉位面板</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      min-height: 100vh;
      padding: 12px 14px 24px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .pair-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .eth-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #627eea, #8498f0);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .pair-name { font-size: 18px; font-weight: 700; }
    .pair-sub  { font-size: 11px; color: #888; }

    .badge-open {
      background: #1a3a28;
      color: #2ecc71;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      border: 1px solid #2ecc71;
    }

    .card {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 11px;
      color: #888;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .label { font-size: 11px; color: #888; margin-bottom: 3px; }

    .direction-val {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }
    .long  { color: #e74c3c; }
    .short { color: #2ecc71; }

    .size-val {
      font-size: 22px;
      font-weight: 800;
      color: #e74c3c;
    }

    .progress-wrap {
      background: #2a2a2a;
      border-radius: 4px;
      height: 6px;
      margin-top: 8px;
    }
    .progress-bar {
      height: 6px;
      border-radius: 4px;
      background: #e74c3c;
      transition: width 0.4s;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 8px;
    }

    .price-block { flex: 1; }

    .price-entry { font-size: 20px; font-weight: 700; }

    .live-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .live-badge {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 4px;
      background: #e74c3c;
      color: #fff;
      font-weight: 700;
    }
    .price-live { font-size: 20px; font-weight: 700; }

    .pnl-block { text-align: right; }
    .pnl-pct   { font-size: 17px; font-weight: 700; }
    .pnl-usdt  { font-size: 12px; margin-top: 2px; }
    .profit { color: #e74c3c; }
    .loss   { color: #2ecc71; }

    .tp-sl-row {
      display: flex;
      gap: 10px;
    }
    .tp-box, .sl-box {
      flex: 1;
      background: #111;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .tp-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .tp-icon {
      font-size: 14px;
    }
    .tp-label { font-size: 12px; font-weight: 600; color: #888; }

    .tp-val { font-size: 16px; font-weight: 700; margin: 3px 0; }

    .sl-status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
      display: inline-block;
      margin-top: 4px;
    }
    .sl-active    { background: #1a3a28; color: #2ecc71; border: 1px solid #2ecc71; }
    .sl-triggered { background: #3a1a1a; color: #e74c3c; border: 1px solid #e74c3c; }

    .legend {
      font-size: 10px;
      color: #666;
      margin-top: 10px;
      text-align: center;
    }
    .legend span { margin: 0 6px; }

    .update-time {
      font-size: 10px;
      color: #555;
      text-align: center;
      margin-top: 8px;
    }

    .close-hit {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
      border: 1px solid transparent;
    }
    .close-hit.tp {
      background: #1a3a28;
      color: #2ecc71;
      border-color: #2ecc71;
    }
    .close-hit.sl {
      background: #3a1a1a;
      color: #e74c3c;
      border-color: #e74c3c;
    }

    .hit-history {
      margin-top: 12px;
      background: #151515;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .hit-history-title {
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .hit-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px dashed #2a2a2a;
    }
    .hit-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .hit-left {
      font-size: 12px;
      font-weight: 600;
    }
    .hit-left.tp { color: #2ecc71; }
    .hit-left.sl { color: #e74c3c; }
    .hit-right {
      font-size: 11px;
      color: #9a9a9a;
      text-align: right;
    }

    .action-row {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .close-btn {
      border: 1px solid #e74c3c;
      background: #351818;
      color: #ffb3ad;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 14px;
      cursor: pointer;
    }
    .close-btn:active {
      transform: translateY(1px);
    }
    .panel-btn {
      border: 1px solid #3c6d9f;
      background: #172634;
      color: #b2dbff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 14px;
      cursor: pointer;
    }
    .panel-btn:active {
      transform: translateY(1px);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
  </style>
</head>
<body>

<div id="app" class="loading">載入倉位資料中...</div>

<script>
  const APP_VERSION = "20260421-1";

  // ── 讀取 URL 參數（初始值 / 備用）──
  const p = new URLSearchParams(location.search);
  let DIR    = p.get("dir")   || "long";
  let ENTRY  = parseFloat(p.get("entry") || "0");
  let TP     = parseFloat(p.get("tp")    || "0");
  let SL     = parseFloat(p.get("sl")    || "0");
  let SIZE   = parseFloat(p.get("size")  || "20");
  const PAIR   = p.get("pair")  || "ETHUSDT";
  const LEV    = parseInt(p.get("lev")     || "10", 10);
  const FORCE_RESTART = p.get("restart") === "1";
  const hasUrlPosition = !FORCE_RESTART && ENTRY > 0 && TP > 0 && SL > 0;
  let POSITION_OPEN = hasUrlPosition;
  let LAST_CLOSE_REASON = "";
  let LAST_CLOSE_PRICE = 0;
  let LAST_CLOSE_TS = 0;
  let LAST_CLOSE_CANDLE_HIGH = 0;
  let LAST_CLOSE_CANDLE_LOW = 0;
  let CLOSE_HITS = [];
  let POSITION_NOTIONAL_USDT = 0;
  let POSITION_MARGIN_USDT = 0;
  let BINANCE_ENTRY_PRICE = 0;
  let BINANCE_MARK_PRICE = 0;
  let BINANCE_UNREALIZED_PNL_USDT = null;
  let ROUND_TRIP_FEE_RATE = 0;
  let FUNDING_RATE = 0;
  let FUNDING_COST_RATE_EST = 0;
  let COST_EVAL_HOLD_HOURS = 0;

  let livePrice = 0;

  // ── Telegram Web App 初始化 ──
  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }

  // ── 取得即時倉位資料（position.json）──
  // Telegram 內建瀏覽器有時會對特定網域或快取策略較嚴格，
  // 先嘗試同網域（GitHub Pages），再退回 raw.githubusercontent。
  const POSITION_JSON_URLS = [
    "./position.json",
    "/ETH-bot/docs/position.json",
    "/ETH-bot/position.json",
    "https://raw.githubusercontent.com/josh940085/ETH-bot/main/docs/position.json",
  ];
  let LAST_POSITION_SOURCE = "";
  let LAST_POSITION_TS = 0;
  const FETCH_TIMEOUT_MS = 1800;
  let refreshInFlight = false;
  let refreshQueued = false;

  async function fetchJsonWithTimeout(url, timeoutMs = FETCH_TIMEOUT_MS) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), timeoutMs);
    try {
      const res = await fetch(url, {
        cache: "no-store",
        signal: ctrl.signal,
      });
      if (!res.ok) return null;
      const data = await res.json();
      if (typeof data !== "object" || data === null) return null;
      return data;
    } catch (_) {
      return null;
    } finally {
      clearTimeout(timer);
    }
  }

  async function fetchPositionData() {
    const candidates = [];
    const nowSec = Math.floor(Date.now() / 1000);

    for (const base of POSITION_JSON_URLS) {
      const url = base + (base.includes("?") ? "&" : "?") + "t=" + Date.now();
      const data = await fetchJsonWithTimeout(url);
      if (!data) continue;
      const tsNum = Number(data.ts);
      const ts = Number.isFinite(tsNum) ? tsNum : 0;
      candidates.push({ base, data, ts });
    }

    if (!candidates.length) {
      // 全部失敗：保留原本 URL 參數作為最後備援
      return;
    }

    // 選擇時間戳最新的那份，避免先命中舊快取就鎖死資料。
    candidates.sort((a, b) => b.ts - a.ts);
    const picked = candidates[0];
    const data = picked.data;
    const dataAge = picked.ts > 0 ? nowSec - picked.ts : Infinity;

    // 若取到的資料比目前舊，直接跳過（同秒資料仍允許覆蓋，避免漏更新）
    if (picked.ts > 0 && picked.ts < LAST_POSITION_TS) return;

    if (picked.ts > 0) {
      LAST_POSITION_TS = picked.ts;
    }

    // 安全閾值：僅接受新鮮資料，避免舊快取把狀態拉回去。
    const STALE_CLOSE_SEC = 900;
    const STALE_OPEN_SEC = 900;

    if (data.open && dataAge < STALE_OPEN_SEC) {
      POSITION_OPEN = true;
      if (typeof data.direction === "string" && data.direction) DIR = data.direction;
      const be = Number(data.binance_entry_price);
      if (Number.isFinite(be) && be > 0) {
        BINANCE_ENTRY_PRICE = be;
        ENTRY = be;
      } else if (Number.isFinite(Number(data.entry))) {
        ENTRY = parseFloat(data.entry);
      }
      if (Number.isFinite(Number(data.tp))) TP = parseFloat(data.tp);
      if (Number.isFinite(Number(data.sl))) SL = parseFloat(data.sl);
      if (Number.isFinite(Number(data.size))) SIZE = Number(data.size) * 100;
      POSITION_NOTIONAL_USDT = Number.isFinite(Number(data.position_notional_usdt)) ? Number(data.position_notional_usdt) : 0;
      POSITION_MARGIN_USDT = Number.isFinite(Number(data.position_margin_usdt)) ? Number(data.position_margin_usdt) : 0;
    } else if (dataAge < STALE_CLOSE_SEC) {
      // 已平倉且資料是新鮮的（15 分鐘內）→ 確認關閉
      POSITION_OPEN = false;
      LAST_CLOSE_REASON = String(data.last_close_reason || "").toUpperCase();
      LAST_CLOSE_PRICE = Number.isFinite(Number(data.last_close_price)) ? parseFloat(data.last_close_price) : 0;
      LAST_CLOSE_TS = Number.isFinite(Number(data.last_close_ts)) ? Number(data.last_close_ts) : 0;
      LAST_CLOSE_CANDLE_HIGH = Number.isFinite(Number(data.last_close_candle_high)) ? parseFloat(data.last_close_candle_high) : 0;
      LAST_CLOSE_CANDLE_LOW = Number.isFinite(Number(data.last_close_candle_low)) ? parseFloat(data.last_close_candle_low) : 0;
      POSITION_NOTIONAL_USDT = Number.isFinite(Number(data.position_notional_usdt)) ? Number(data.position_notional_usdt) : 0;
      POSITION_MARGIN_USDT = Number.isFinite(Number(data.position_margin_usdt)) ? Number(data.position_margin_usdt) : 0;
      if (Number.isFinite(Number(data.entry))) ENTRY = parseFloat(data.entry);
      if (Number.isFinite(Number(data.tp))) TP = parseFloat(data.tp);
      if (Number.isFinite(Number(data.sl))) SL = parseFloat(data.sl);
      if (Number.isFinite(Number(data.size))) SIZE = Number(data.size) * 100;
    }
    ROUND_TRIP_FEE_RATE = Number.isFinite(Number(data.fee_round_trip_rate)) ? Number(data.fee_round_trip_rate) : ROUND_TRIP_FEE_RATE;
    FUNDING_RATE = Number.isFinite(Number(data.funding_rate)) ? Number(data.funding_rate) : FUNDING_RATE;
    FUNDING_COST_RATE_EST = Number.isFinite(Number(data.funding_cost_rate_est)) ? Number(data.funding_cost_rate_est) : FUNDING_COST_RATE_EST;
    COST_EVAL_HOLD_HOURS = Number.isFinite(Number(data.cost_eval_hold_hours)) ? Number(data.cost_eval_hold_hours) : COST_EVAL_HOLD_HOURS;
    BINANCE_MARK_PRICE = Number.isFinite(Number(data.binance_mark_price)) ? Number(data.binance_mark_price) : BINANCE_MARK_PRICE;
    BINANCE_UNREALIZED_PNL_USDT = Number.isFinite(Number(data.binance_unrealized_pnl_usdt)) ? Number(data.binance_unrealized_pnl_usdt) : null;
    if (Array.isArray(data.close_hits)) {
      CLOSE_HITS = data.close_hits
        .map((h) => ({
          reason: String((h && h.reason) || "").toUpperCase(),
          price: Number.isFinite(Number(h && h.price)) ? Number(h.price) : 0,
          ts: Number.isFinite(Number(h && h.ts)) ? Number(h.ts) : 0,
        }))
        .filter((h) => h.reason === "TP" || h.reason === "SL")
        .sort((a, b) => b.ts - a.ts)
        .slice(0, 10);
    }
    // else: 資料過期且 open=false → 保留目前 POSITION_OPEN 狀態不動

    const ageMin = dataAge > 60 ? ` (${Math.floor(dataAge / 60)}m前)` : "";
    LAST_POSITION_SOURCE = picked.base + ageMin;
  }

  // ── 取得即時價格 ──
  async function fetchPrice() {
    const data = await fetchJsonWithTimeout(
      `https://fapi.binance.com/fapi/v1/ticker/price?symbol=${PAIR}`,
      2200
    );
    if (!data) return;
    const px = parseFloat(data.price || 0);
    if (Number.isFinite(px) && px > 0) {
      livePrice = px;
    }
  }

  // ── 同時更新倉位資料與即時價格 ──
  async function refresh() {
    if (refreshInFlight) {
      refreshQueued = true;
      return;
    }
    refreshInFlight = true;
    try {
      await Promise.all([fetchPositionData(), fetchPrice()]);
      render();
    } finally {
      refreshInFlight = false;
      if (refreshQueued) {
        refreshQueued = false;
        void refresh();
      }
    }
  }

  // ── 計算未實現盈虧 ──
  function calcPnl(live) {
    const livePx = (Number.isFinite(Number(live)) && Number(live) > 0)
      ? Number(live)
      : (BINANCE_MARK_PRICE > 0 ? BINANCE_MARK_PRICE : 0);
    if (!livePx || !ENTRY) {
      return {
        gross_pct: 0,
        gross_usdt: 0,
        shown_pct: 0,
        shown_usdt: 0,
        net_pct: 0,
        net_usdt: 0,
        cost_usdt: 0,
        total_cost_rate: 0,
        source: "estimate",
      };
    }
    const raw = DIR === "long"
      ? (livePx - ENTRY) / ENTRY
      : (ENTRY - livePx) / ENTRY;
    const notional = POSITION_NOTIONAL_USDT > 0 ? POSITION_NOTIONAL_USDT : Math.max(0, ENTRY * (SIZE / 100) * LEV);
    const margin = POSITION_MARGIN_USDT > 0 ? POSITION_MARGIN_USDT : (notional > 0 ? notional / Math.max(1, LEV) : 0);
    const gross_usdt = raw * notional;
    const gross_pct = margin > 0 ? (gross_usdt / margin) * 100 : raw * LEV * 100;
    const hasExchangePnl = Number.isFinite(BINANCE_UNREALIZED_PNL_USDT);
    const shown_usdt = hasExchangePnl ? BINANCE_UNREALIZED_PNL_USDT : gross_usdt;
    const shown_pct = margin > 0 ? (shown_usdt / margin) * 100 : gross_pct;

    const total_cost_rate = Math.max(0, ROUND_TRIP_FEE_RATE) + Math.max(0, FUNDING_COST_RATE_EST);
    const cost_usdt = notional * total_cost_rate;
    const net_usdt = shown_usdt - cost_usdt;
    const net_pct = margin > 0 ? (net_usdt / margin) * 100 : shown_pct;
    return { gross_pct, gross_usdt, shown_pct, shown_usdt, net_pct, net_usdt, cost_usdt, total_cost_rate, source: hasExchangePnl ? "binance" : "estimate" };
  }

  function fmt_size(n) {
    const v = Number(n);
    if (!Number.isFinite(v)) return "0.0";
    return v.toFixed(1);
  }

  function triggerManualClose() {
    if (!(window.Telegram && window.Telegram.WebApp && Telegram.WebApp.sendData)) {
      if (window.alert) alert("請在 Telegram 內開啟此面板，才能使用手動平倉。");
      return;
    }
    const payload = {
      action: "manual_close",
      source: "mini_app",
      ts: Date.now(),
    };
    try {
      Telegram.WebApp.sendData(JSON.stringify(payload));
      if (Telegram.WebApp.showAlert) {
        Telegram.WebApp.showAlert("已送出手動平倉請求，請稍候 Bot 回覆。");
      }
    } catch (_) {
      if (window.alert) alert("手動平倉請求送出失敗，請稍後再試。");
    }
  }

  function closePanel() {
    if (window.Telegram && window.Telegram.WebApp && Telegram.WebApp.close) {
      Telegram.WebApp.close();
      return;
    }
    if (window.history && history.length > 1) {
      history.back();
    }
  }

  // ── 判斷 SL 是否已觸發 ──
  function slTriggered(live) {
    if (!live || !SL) return false;
    return DIR === "long" ? live <= SL : live >= SL;
  }

  // ── 格式化 ──
  function fmt(n, dec = 2) {
    return n.toLocaleString("zh-TW", {
      minimumFractionDigits: dec,
      maximumFractionDigits: dec
    });
  }

  function fmt_signed(n) {
    return (n >= 0 ? "+" : "") + n.toFixed(2);
  }

  function now_str() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    const ss = String(d.getSeconds()).padStart(2, "0");
    return `${hh}:${mm}:${ss}`;
  }

  function ts_str(ts) {
    const n = Number(ts);
    if (!Number.isFinite(n) || n <= 0) return "-";
    const d = new Date(n * 1000);
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    const ss = String(d.getSeconds()).padStart(2, "0");
    return `${hh}:${mm}:${ss}`;
  }

  function renderCloseHits() {
    if (!Array.isArray(CLOSE_HITS) || CLOSE_HITS.length === 0) {
      return `
  <div class="hit-history">
    <div class="hit-history-title">最近 TP / SL 命中</div>
    <div style="font-size:12px;color:#777;">目前尚無歷史命中紀錄</div>
  </div>`;
    }

    const rows = CLOSE_HITS.map((h) => {
      const cls = h.reason === "TP" ? "tp" : "sl";
      const label = h.reason === "TP" ? "TP 命中" : "SL 命中";
      const priceText = h.price > 0 ? fmt(h.price) : "-";
      return `
    <div class="hit-item">
      <div class="hit-left ${cls}">${label}</div>
      <div class="hit-right">${ts_str(h.ts)} ｜ ${priceText}</div>
    </div>`;
    }).join("");

    return `
  <div class="hit-history">
    <div class="hit-history-title">最近 TP / SL 命中</div>
    ${rows}
  </div>`;
  }

  // ── 渲染 UI ──
  function render() {
    // 已平倉：顯示簡單的已平倉面板
    if (!POSITION_OPEN) {
      const hitClass = LAST_CLOSE_REASON === "TP" ? "tp" : (LAST_CLOSE_REASON === "SL" ? "sl" : "");
      const hitText = LAST_CLOSE_REASON === "TP"
        ? "✅ 止盈命中"
        : (LAST_CLOSE_REASON === "SL" ? "❌ 止損命中" : "📋 已平倉");
      const closePriceText = LAST_CLOSE_PRICE > 0 ? fmt(LAST_CLOSE_PRICE) : "-";
      const closeCandleText = (LAST_CLOSE_CANDLE_HIGH > 0 && LAST_CLOSE_CANDLE_LOW > 0)
        ? `${fmt(LAST_CLOSE_CANDLE_HIGH)} / ${fmt(LAST_CLOSE_CANDLE_LOW)}`
        : "-";
      document.getElementById("app").outerHTML = `
<div id="app">
  <div class="header">
    <div class="pair-info">
      <div class="eth-icon">◆</div>
      <div>
        <div class="pair-name">${PAIR}</div>
        <div class="pair-sub">永續合約 · ${LEV}x</div>
      </div>
    </div>
    <div class="badge-open" style="background:#2a1a1a;color:#e74c3c;border-color:#e74c3c;">● 已平倉</div>
  </div>
  <div class="card" style="text-align:center;padding:32px 16px;">
    <div class="close-hit ${hitClass}">${hitText}</div>
    <div style="font-size:32px;margin-bottom:12px;">📋</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:6px;">目前無持倉</div>
    <div style="font-size:13px;color:#888;">平倉價：${closePriceText}</div>
    <div style="font-size:12px;color:#777;margin-top:4px;">1m 高/低：${closeCandleText}</div>
    <div style="font-size:12px;color:#777;margin-top:4px;">命中時間：${ts_str(LAST_CLOSE_TS)}</div>
  </div>
  ${renderCloseHits()}
  <div class="update-time">最後更新：${now_str()} ｜ 倉位來源：${LAST_POSITION_SOURCE || "URL 參數"} ｜ 倉位時間：${ts_str(LAST_POSITION_TS)}</div>
</div>`;
      return;
    }

    const live = livePrice > 0 ? livePrice : BINANCE_MARK_PRICE;
    const pnl  = calcPnl(live);
    const sl_off = slTriggered(live);
    const isLong  = DIR === "long";

    const dirLabel = isLong ? "多單 ↑" : "空單 ↓";
    const dirClass = isLong ? "long" : "short";

    const pnlClass  = pnl.shown_pct >= 0 ? "profit" : "loss";

    const liveDiff  = live ? live - ENTRY : 0;
    const liveDiffStr = `${liveDiff >= 0 ? "↑" : "↓"} ${Math.abs(liveDiff).toFixed(2)} (${(liveDiff / ENTRY * 100).toFixed(2)}%)`;

    document.getElementById("app").outerHTML = `
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="pair-info">
      <div class="eth-icon">◆</div>
      <div>
        <div class="pair-name">${PAIR}</div>
        <div class="pair-sub">永續合約 · ${LEV}x</div>
      </div>
    </div>
    <div class="badge-open">● 持倉中</div>
  </div>

  <!-- Direction + Size -->
  <div class="card">
    <div class="row">
      <div>
        <div class="label">方向</div>
        <div class="direction-val ${dirClass}">${dirLabel}</div>
      </div>
      <div style="text-align:right">
        <div class="label">目前倉位</div>
        <div class="size-val">${fmt_size(SIZE)}%</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" style="width:${Math.min(Math.max(SIZE, 0), 100)}%"></div>
    </div>
  </div>

  <!-- Prices + PnL -->
  <div class="card">
    <div class="price-row">
      <div class="price-block">
        <div class="label">進場價</div>
        <div class="price-entry">${fmt(ENTRY)}</div>
      </div>
      <div class="price-block">
        <div class="label">現價</div>
        <div class="live-wrap">
          <span class="live-badge">LIVE</span>
        </div>
        <div class="price-live">${live ? fmt(live) : "─"}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">${live ? liveDiffStr : ""}</div>
      </div>
      <div class="pnl-block">
        <div class="label">未實現盈虧</div>
        <div class="pnl-pct ${pnlClass}">${live ? fmt_signed(pnl.shown_pct) + "%" : "─"}</div>
        <div class="pnl-usdt ${pnlClass}">${live ? fmt_signed(pnl.shown_usdt) + " USDT" : ""}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">
          ${live ? (pnl.source === "binance"
            ? `交易所盈虧 ${fmt_signed(pnl.shown_usdt)} | 成本估 -${pnl.cost_usdt.toFixed(2)} (${(pnl.total_cost_rate*100).toFixed(3)}%)`
            : `估算盈虧 ${fmt_signed(pnl.gross_usdt)} | 成本估 -${pnl.cost_usdt.toFixed(2)} (${(pnl.total_cost_rate*100).toFixed(3)}%)`) : ""}
        </div>
      </div>
    </div>
  </div>

  <!-- TP / SL -->
  <div class="tp-sl-row">
    <div class="tp-box">
      <div class="tp-header">
        <span class="tp-icon">🎯</span>
        <span class="tp-label">止盈 (TP)</span>
      </div>
      <div class="tp-val">${fmt(TP)}</div>
    </div>
    <div class="sl-box">
      <div class="tp-header">
        <span class="tp-icon">🛑</span>
        <span class="tp-label">止損 (SL)</span>
      </div>
      <div class="tp-val">${fmt(SL)}</div>
      <div class="sl-status ${sl_off ? "sl-triggered" : "sl-active"}">
        ${sl_off ? "⚠️ 已觸發" : "✅ 監控中"}
      </div>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <span>盈利增加 → 紅色</span>｜<span>觸發止損 → 綠色</span>
  </div>

  <div class="action-row">
    <button class="close-btn" onclick="triggerManualClose()">手動平倉</button>
    <button class="panel-btn" onclick="closePanel()">關閉面板</button>
  </div>

  ${renderCloseHits()}

  <div class="update-time">最後更新：${now_str()} ｜ 倉位來源：${LAST_POSITION_SOURCE || "URL 參數"} ｜ 倉位時間：${ts_str(LAST_POSITION_TS)}</div>
</div>`;
  }

  // ── 啟動 ──
  refresh();
  setInterval(refresh, 3000);

  // 頁面重新可見時（從背景切回）立刻刷新
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
      LAST_POSITION_TS = 0;  // 重置以強制重取最新資料
      refresh();
    }
  });
</script>
</body>
</html>
