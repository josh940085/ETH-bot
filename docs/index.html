<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>倉位面板</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% -10%, rgba(51, 86, 123, 0.22), transparent 38%),
        linear-gradient(180deg, #0a0d11 0%, #0d1015 54%, #090b0f 100%);
      color: #ffffff;
      min-height: 100vh;
      padding: 12px 14px 24px;
    }

    #app {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 2px 2px 0;
    }

    .pair-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .eth-icon {
      width: 36px; height: 36px;
      background:
        radial-gradient(circle at 34% 26%, rgba(255,255,255,0.88), transparent 0 11%, transparent 12%),
        linear-gradient(135deg, #5267d9, #7890f2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 10px 22px rgba(82, 103, 217, 0.18);
    }

    .pair-name {
      font-size: 18px;
      font-weight: 750;
      letter-spacing: 0.2px;
    }
    .pair-sub  { font-size: 11px; color: #8c96a3; line-height: 1.35; }

    .badge-open {
      background: rgba(46, 204, 113, 0.11);
      color: #74e2a1;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      border: 1px solid rgba(116, 226, 161, 0.62);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .card {
      background: linear-gradient(180deg, rgba(25, 29, 36, 0.98), rgba(17, 20, 26, 0.98));
      border: 1px solid rgba(121, 139, 161, 0.10);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.20), inset 0 1px 0 rgba(255,255,255,0.035);
    }

    .asset-hero {
      background:
        linear-gradient(135deg, rgba(22, 53, 82, 0.96), rgba(20, 74, 111, 0.88)),
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent);
      border: 1px solid rgba(92, 157, 212, 0.42);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.22), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .asset-hero-main {
      min-width: 0;
    }

    .asset-hero-title {
      font-size: 11px;
      color: #bcd9ee;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .asset-hero-value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
      color: #ffffff;
      letter-spacing: 0.1px;
    }

    .asset-hero-sub {
      margin-top: 6px;
      font-size: 11px;
      color: #b6cbe0;
      line-height: 1.4;
    }

    .asset-hero-winrate {
      text-align: right;
      flex: 0 0 auto;
      min-width: 96px;
    }

    .asset-hero-winrate-label {
      font-size: 11px;
      color: #bcd9ee;
      margin-bottom: 6px;
    }

    .asset-hero-winrate-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      color: #ffffff;
    }

    .asset-hero-winrate-sub {
      margin-top: 6px;
      font-size: 11px;
      color: #b6cbe0;
    }

    .card-title {
      font-size: 11px;
      color: #7f8b99;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .label { font-size: 11px; color: #7f8b99; margin-bottom: 3px; }

    .direction-val {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }
    .long  { color: #e74c3c; }
    .short { color: #2ecc71; }

    .size-val {
      font-size: 22px;
      font-weight: 800;
      color: #e74c3c;
    }

    .progress-wrap {
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      height: 6px;
      margin-top: 8px;
    }
    .progress-bar {
      height: 6px;
      border-radius: 4px;
      background: #e74c3c;
      transition: width 0.4s;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 8px;
    }

    .price-block { flex: 1; }

    .price-entry { font-size: 20px; font-weight: 700; }

    .live-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .live-badge {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 4px;
      background: #e74c3c;
      color: #fff;
      font-weight: 700;
    }
    .price-live { font-size: 20px; font-weight: 700; }

    .pnl-block { text-align: right; }
    .pnl-pct   { font-size: 17px; font-weight: 700; }
    .pnl-usdt  { font-size: 12px; margin-top: 2px; }
    .profit { color: #e74c3c; }
    .loss   { color: #2ecc71; }

    .tp-sl-row {
      display: flex;
      gap: 10px;
    }
    .tp-box, .sl-box {
      flex: 1;
      background: rgba(9, 12, 17, 0.62);
      border: 1px solid rgba(121, 139, 161, 0.10);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .tp-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .tp-icon {
      font-size: 14px;
    }
    .tp-label { font-size: 12px; font-weight: 600; color: #7f8b99; }

    .tp-val { font-size: 16px; font-weight: 700; margin: 3px 0; }

    .sl-status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
      display: inline-block;
      margin-top: 4px;
    }
    .sl-active    { background: #1a3a28; color: #2ecc71; border: 1px solid #2ecc71; }
    .sl-triggered { background: #3a1a1a; color: #e74c3c; border: 1px solid #e74c3c; }

    .legend {
      font-size: 10px;
      color: #667180;
      margin-top: 10px;
      text-align: center;
    }
    .legend span { margin: 0 6px; }

    .update-time {
      font-size: 10px;
      color: #5e6977;
      text-align: center;
      margin-top: 8px;
    }

    .close-hit {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
      border: 1px solid transparent;
    }
    .close-hit.tp {
      background: #1a3a28;
      color: #2ecc71;
      border-color: #2ecc71;
    }
    .close-hit.sl {
      background: #3a1a1a;
      color: #e74c3c;
      border-color: #e74c3c;
    }
    .close-summary-card {
      text-align: center;
      padding: 22px 16px;
      background:
        linear-gradient(180deg, rgba(25, 29, 36, 0.98), rgba(15, 18, 23, 0.98));
    }
    .close-summary-icon {
      font-size: 26px;
      margin-bottom: 8px;
    }
    .close-summary-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .hit-history {
      margin-top: 12px;
      background: linear-gradient(180deg, rgba(21, 25, 31, 0.98), rgba(15, 18, 23, 0.98));
      border: 1px solid rgba(121, 139, 161, 0.10);
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .hit-history-title {
      font-size: 11px;
      color: #7f8b99;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .hit-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px dashed rgba(121, 139, 161, 0.16);
    }
    .hit-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .hit-left {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.45;
      word-break: break-word;
    }
    .hit-left.tp { color: #2ecc71; }
    .hit-left.sl { color: #e74c3c; }
    .hit-right {
      font-size: 11px;
      color: #9a9a9a;
      text-align: right;
    }
    .news-map {
      position: relative;
      height: clamp(230px, 42vw, 300px);
      margin-bottom: 10px;
      overflow: hidden;
      border: 1px solid rgba(82, 106, 128, 0.28);
      border-radius: 10px;
      background:
        linear-gradient(90deg, rgba(2, 6, 10, 0.36), transparent 18%, transparent 82%, rgba(2, 6, 10, 0.36)),
        url("./world-map.svg") center / cover no-repeat,
        #060b12;
      box-shadow: inset 0 0 42px rgba(0, 0, 0, 0.42);
    }
    .news-marker {
      position: absolute;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.08), 0 8px 16px rgba(0, 0, 0, 0.28);
    }
    .news-marker.tp {
      background: #2ecc71;
      border-color: #a6f4c5;
    }
    .news-marker.sl {
      background: #e74c3c;
      border-color: #ffc9c3;
    }
    .news-marker.neutral {
      background: #6d83f2;
      border-color: #dce4ff;
    }
    .news-marker-label {
      position: absolute;
      max-width: 156px;
      padding: 5px 8px;
      border-radius: 7px;
      background: rgba(8, 12, 18, 0.92);
      border: 1px solid rgba(151, 174, 196, 0.18);
      color: #d4dee8;
      font-size: 12px;
      line-height: 1.25;
      transform: translate(8px, -50%);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }
    .news-location {
      color: #8fb8da;
      font-size: 11px;
      margin-top: 2px;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .section-grid-compact {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .section-grid-compact .metric-card {
      min-height: 100%;
    }

    .metric-card {
      background: rgba(9, 12, 17, 0.56);
      border: 1px solid rgba(121, 139, 161, 0.12);
      border-radius: 8px;
      padding: 10px 12px;
      min-width: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.025);
    }

    .metric-label {
      font-size: 10px;
      color: #7d8896;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .metric-value {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
    }

    .metric-sub {
      font-size: 11px;
      color: #8e9aa8;
      margin-top: 4px;
      line-height: 1.35;
    }

    .section-note {
      font-size: 11px;
      color: #8793a2;
      line-height: 1.45;
      margin-top: 12px;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(121, 139, 161, 0.14);
      background: rgba(9, 12, 17, 0.58);
      color: #c8d1dc;
    }

    .status-chip.good {
      background: #102217;
      border-color: #28573b;
      color: #8fe4b2;
    }

    .status-chip.warn {
      background: #2a2011;
      border-color: #6a4c1a;
      color: #f0c777;
    }

    .status-chip.bad {
      background: #2c1616;
      border-color: #6b2b2b;
      color: #ffb4b0;
    }

    .status-chip.info {
      background: #14212f;
      border-color: #35536f;
      color: #b9dcff;
    }

    .mini-kline {
      margin-top: 12px;
      background: rgba(9, 12, 17, 0.60);
      border: 1px solid rgba(121, 139, 161, 0.12);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .mini-kline-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .mini-kline-title {
      font-size: 11px;
      font-weight: 700;
      color: #8d9aaa;
    }

    .mini-kline-meta {
      font-size: 10px;
      color: #7b8795;
      text-align: right;
    }

    .mini-kline svg {
      display: block;
      width: 100%;
      height: 150px;
    }

    .mini-kline-empty {
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7b8795;
      font-size: 11px;
      border-radius: 8px;
      background: rgba(4, 7, 11, 0.46);
    }

    .size-summary {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-top: 10px;
      font-size: 11px;
      color: #8793a2;
    }

    .size-summary strong {
      color: #f3f3f3;
      font-size: 12px;
    }

    .range-track {
      position: relative;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      overflow: hidden;
      margin-top: 12px;
    }

    .range-fill {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(46, 204, 113, 0.35), rgba(241, 196, 15, 0.28), rgba(231, 76, 60, 0.35));
    }

    .range-marker {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.95);
      background: #fff;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.08);
      transform: translate(-50%, -50%);
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 6px;
      font-size: 10px;
      color: #7b8795;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(121, 139, 161, 0.18), transparent);
      margin: 12px 0;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }

    @media (max-width: 520px) {
      .asset-hero {
        align-items: flex-start;
      }

      .asset-hero-winrate {
        min-width: 82px;
      }

      .asset-hero-winrate-value {
        font-size: 20px;
      }

      .section-grid-compact {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 380px) {
      .section-grid {
        grid-template-columns: 1fr;
      }

      .section-grid-compact {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div id="app" class="loading">載入倉位資料中...</div>

<script>
  const APP_VERSION = "20260604-10";
  const PANEL_VIEWER_CACHE_KEY = "eth-bot-panel-viewer";

  function readViewerCache() {
    try {
      const raw = localStorage.getItem(PANEL_VIEWER_CACHE_KEY);
      if (!raw) return {};
      const data = JSON.parse(raw);
      return (data && typeof data === "object") ? data : {};
    } catch (_) {
      return {};
    }
  }

  function writeViewerCache(patch) {
    try {
      const prev = readViewerCache();
      const next = Object.assign({}, prev, patch || {}, { updatedAt: Date.now() });
      localStorage.setItem(PANEL_VIEWER_CACHE_KEY, JSON.stringify(next));
    } catch (_) {}
  }

  function clearViewerCache() {
    try {
      localStorage.removeItem(PANEL_VIEWER_CACHE_KEY);
    } catch (_) {}
  }

  // ── 讀取 URL 參數（初始值 / 備用）──
  const p = new URLSearchParams(location.search);
  const cachedViewer = readViewerCache();
  const readNumberParam = (name, fallback = 0) => {
    const raw = p.get(name);
    if (raw === null || raw === "") return fallback;
    const value = Number(raw);
    return Number.isFinite(value) ? value : fallback;
  };
  const readNullableNumberParam = (name) => {
    const raw = p.get(name);
    if (raw === null || raw === "") return null;
    const value = Number(raw);
    return Number.isFinite(value) ? value : null;
  };
  let DIR    = p.get("dir")   || "long";
  let ENTRY  = parseFloat(p.get("entry") || "0");
  let TP     = parseFloat(p.get("tp")    || "0");
  let SL     = parseFloat(p.get("sl")    || "0");
  let SIZE   = parseFloat(p.get("size")  || "20");
  let PAIR   = p.get("pair")  || "ETHUSDT";
  let LEV    = parseInt(p.get("lev")     || "10", 10);
  const FORCE_RESTART = p.get("restart") === "1";
  const URL_SNAPSHOT_TS = Number.isFinite(Number(p.get("snapshot_ts"))) ? Number(p.get("snapshot_ts")) : 0;
  const REMOTE_STATE_URL = p.get("state_url") || cachedViewer.stateUrl || "";
  const REMOTE_WS_URL = p.get("ws_url") || cachedViewer.wsUrl || "";
  const PANEL_SESSION = p.get("panel_session") || cachedViewer.panelSession || "";
  const hasUrlPosition = !FORCE_RESTART && ENTRY > 0 && TP > 0 && SL > 0;
  let POSITION_OPEN = hasUrlPosition;
  let LAST_CLOSE_REASON = "";
  let LAST_CLOSE_PRICE = 0;
  let LAST_CLOSE_TS = 0;
  let LAST_CLOSE_CANDLE_HIGH = 0;
  let LAST_CLOSE_CANDLE_LOW = 0;
  let CLOSE_HITS = [];
  let LATEST_NEWS = [];
  const NEWS_LOCATION_HINTS = [
    { keys: ["canada", "air canada", "加拿大"], name: "加拿大", lat: 56.1304, lon: -106.3468 },
    { keys: ["united states", "u.s.", " us ", "美國", "華爾街", "wall street", "new york", "紐約"], name: "美國", lat: 39.8283, lon: -98.5795 },
    { keys: ["washington", "white house", "federal reserve", "fed", "白宮", "聯準會"], name: "華盛頓", lat: 38.9072, lon: -77.0369 },
    { keys: ["china", "beijing", "中國", "北京"], name: "中國", lat: 35.8617, lon: 104.1954 },
    { keys: ["taiwan", "台灣", "臺灣"], name: "台灣", lat: 23.6978, lon: 120.9605 },
    { keys: ["japan", "tokyo", "日本", "東京"], name: "日本", lat: 36.2048, lon: 138.2529 },
    { keys: ["south korea", "korea", "seoul", "韓國", "首爾"], name: "韓國", lat: 35.9078, lon: 127.7669 },
    { keys: ["india", "new delhi", "印度"], name: "印度", lat: 20.5937, lon: 78.9629 },
    { keys: ["pakistan", "巴基斯坦"], name: "巴基斯坦", lat: 30.3753, lon: 69.3451 },
    { keys: ["iran", "tehran", "伊朗"], name: "伊朗", lat: 32.4279, lon: 53.6880 },
    { keys: ["israel", "gaza", "jerusalem", "以色列", "加薩", "耶路撒冷"], name: "以色列/加薩", lat: 31.0461, lon: 34.8516 },
    { keys: ["syria", "damascus", "敘利亞", "大馬士革"], name: "敘利亞", lat: 34.8021, lon: 38.9968 },
    { keys: ["russia", "moscow", "俄羅斯", "莫斯科"], name: "俄羅斯", lat: 61.5240, lon: 105.3188 },
    { keys: ["ukraine", "kyiv", "烏克蘭", "基輔"], name: "烏克蘭", lat: 48.3794, lon: 31.1656 },
    { keys: ["united kingdom", "britain", "london", "英國", "倫敦"], name: "英國", lat: 55.3781, lon: -3.4360 },
    { keys: ["france", "paris", "法國", "巴黎"], name: "法國", lat: 46.2276, lon: 2.2137 },
    { keys: ["germany", "berlin", "德國", "柏林"], name: "德國", lat: 51.1657, lon: 10.4515 },
    { keys: ["europe", "eurozone", "eu ", "歐洲", "歐盟", "歐元區"], name: "歐洲", lat: 54.5260, lon: 15.2551 },
    { keys: ["zambia", "尚比亞", "贊比亞"], name: "尚比亞", lat: -13.1339, lon: 27.8493 },

  async function fetchJsonWithTimeout(url, timeoutMs = POSITION_FETCH_TIMEOUT_MS, options = {}) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), timeoutMs);
    try {
      const headers = Object.assign({}, options.headers || {});
      const res = await fetch(url, {
        cache: "no-store",
        signal: ctrl.signal,
        ...options,
        headers,
      });
      if (res.status === 401 || res.status === 403) {
        return { __auth_error: true, __status: res.status };
      }
      if (!res.ok) return null;
      const data = await res.json();
      if (typeof data !== "object" || data === null) return null;
      return data;
    } catch (_) {
      return null;
    } finally {
      clearTimeout(timer);
    }
  }

  async function fetchTextWithTimeout(url, timeoutMs = POSITION_FETCH_TIMEOUT_MS) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), timeoutMs);
    try {
      const res = await fetch(url, {
        cache: "no-store",
        signal: ctrl.signal,
      });
      if (!res.ok) return "";
      return await res.text();
    } catch (_) {
      return "";
    } finally {
      clearTimeout(timer);
    }
  }

  async function checkAppVersion() {
    const shellUrl = getAppShellUrl();

    const html = await fetchTextWithTimeout(
      `${shellUrl}${sep}version_check=${Date.now()}`,
      POSITION_FETCH_TIMEOUT_MS
    );
    if (!html) return;
    const match = html.match(/const\s+APP_VERSION\s*=\s*["']([^"']+)["']/);
    const nextVersion = match ? String(match[1] || "").trim() : "";
    if (nextVersion && nextVersion !== APP_VERSION) {
      location.reload();

    const dataAge = ts > 0 ? nowSec - ts : Infinity;

    if (URL_SNAPSHOT_TS > 0) {
      if (ts <= 0) return false;
      if (ts < URL_SNAPSHOT_TS) return false;
    }

    if (ts > 0 && ts < LAST_POSITION_TS) return false;
    if (ts > 0) {

      POSITION_MARGIN_USDT = Number.isFinite(Number(data.position_margin_usdt)) ? Number(data.position_margin_usdt) : 0;
      BINANCE_QTY = Number.isFinite(Number(data.binance_qty)) ? Number(data.binance_qty) : 0;

      POSITION_OPEN = false;

  function applyPerformancePayload(data) {

    if (typeof data !== "object" || data === null) return false;
    const winRate = Number(data.win_rate);
    const trades = Number(data.trades);
    const wins = Number(data.wins);
    if (!Number.isFinite(winRate)) return false;
    PERFORMANCE_WIN_RATE = winRate;
    PERFORMANCE_TRADES = Number.isFinite(trades) ? trades : 0;
    PERFORMANCE_WINS = Number.isFinite(wins) ? wins : 0;
    PERFORMANCE_SUMMARY_LOCKED = true;
    return true;
  }

  async function fetchPerformanceSummary() {
    if (PERFORMANCE_SUMMARY_LOCKED) return;
    if (!PERFORMANCE_SUMMARY_URLS.length) return;
    const fetchTasks = PERFORMANCE_SUMMARY_URLS.map((base) => {
      const url = base + (base.includes("?") ? "&" : "?") + "t=" + Date.now();
      return fetchJsonWithTimeout(url, POSITION_FETCH_TIMEOUT_MS)
        .then((data) => data || null)
        .catch(() => null);
    });
    const candidates = (await Promise.all(fetchTasks)).filter(Boolean);
    for (const data of candidates) {
      if (applyPerformancePayload(data)) return;
    }
  }

  function scheduleRealtimeReconnect() {
    if (!REMOTE_WS_URL || realtimeReconnectTimer) return;
    realtimeReconnectTimer = setTimeout(() => {
      realtimeReconnectTimer = null;
      connectRealtimeSocket();
    }, WS_RECONNECT_DELAY_MS);
  }

  function connectRealtimeSocket() {
    if (!REMOTE_WS_URL || typeof WebSocket !== "function") return;
    if (!HAS_VIEWER_AUTH) {
      PANEL_ACCESS_STATE = "needs_telegram";
      return;
    }
    if (realtimeSocket && (realtimeSocket.readyState === WebSocket.OPEN || realtimeSocket.readyState === WebSocket.CONNECTING)) {
      return;
    }

    const wsParams = buildViewerAuthQuery();
    const wsUrl = REMOTE_WS_URL + (REMOTE_WS_URL.includes("?") ? "&" : "?") + wsParams.toString();
    realtimeSocket = new WebSocket(wsUrl);

    realtimeSocket.onopen = () => {
      realtimeSocketConnected = true;
      PANEL_ACCESS_STATE = "ready";
      PANEL_ACCESS_MESSAGE = "";
      LAST_POSITION_SOURCE = "Realtime WS";
      render();
    };

    realtimeSocket.onmessage = (event) => {
      try {
        const payload = JSON.parse(event.data);
        if (!payload || typeof payload !== "object") return;
        if (payload.type === "ping") return;
        const data = payload.type === "position" ? payload.data : payload;
        if (applyPositionPayload(data, "Realtime WS")) {
          render();
        }
      } catch (_) {}
    };

    realtimeSocket.onerror = () => {};

    realtimeSocket.onclose = (event) => {
      realtimeSocketConnected = false;
      realtimeSocket = null;
      if (event && event.code === 4401) {
        clearViewerCache();
        PANEL_ACCESS_STATE = "unauthorized";
        PANEL_ACCESS_MESSAGE = "授權已失效，請回 Telegram 重新開一次面板。";
        render();
        return;
      }
      scheduleRealtimeReconnect();
    };
  }

  async function fetchPositionData() {
    const nowSec = Math.floor(Date.now() / 1000);
    const freshWsState = realtimeSocketConnected && LAST_POSITION_TS > 0 && (nowSec - LAST_POSITION_TS) <= EXCHANGE_PNL_FRESH_SEC;

    if (REMOTE_STATE_URL && !freshWsState) {
      const remoteUrl = REMOTE_STATE_URL + (REMOTE_STATE_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
      if (!HAS_VIEWER_AUTH) {
        PANEL_ACCESS_STATE = "needs_telegram";
        return;
      }
      const remoteData = await fetchJsonWithTimeout(remoteUrl, POSITION_FETCH_TIMEOUT_MS, {
        headers: buildViewerAuthHeaders(),
      });
      if (remoteData && remoteData.__auth_error) {
        clearViewerCache();
        PANEL_ACCESS_STATE = "unauthorized";
        PANEL_ACCESS_MESSAGE = "授權已失效，請回 Telegram 重新開一次面板。";
        return;
      }
      if (remoteData && applyPositionPayload(remoteData, "Realtime API")) {
        PANEL_ACCESS_STATE = "ready";
        PANEL_ACCESS_MESSAGE = "";
        return;
      }
    }

    const fetchTasks = POSITION_JSON_URLS.map((base) => {
      const url = base + (base.includes("?") ? "&" : "?") + "t=" + Date.now();
      return fetchJsonWithTimeout(url, POSITION_FETCH_TIMEOUT_MS)
        .then((data) => {
          if (!data) return null;
          const tsNum = Number(data.ts);
          const ts = Number.isFinite(tsNum) ? tsNum : 0;
          return { base, data, ts };
        })
        .catch(() => null);
    });
    const candidates = (await Promise.all(fetchTasks)).filter((x) => x && x.data);

    if (!candidates.length) {
      // 全部失敗：保留原本 URL 參數作為最後備援
      return;
    }

    // 選擇時間戳最新的那份，避免先命中舊快取就鎖死資料。
    candidates.sort((a, b) => b.ts - a.ts);
    const picked = candidates[0];
    const data = picked.data;

    applyPositionPayload(data, picked.base);
  }

  // ── 取得即時價格 ──
  async function fetchPrice() {
    const [lastTrade, premiumIndex] = await Promise.all([
      fetchJsonWithTimeout(
        `https://fapi.binance.com/fapi/v1/ticker/price?symbol=${PAIR}`,
        PRICE_FETCH_TIMEOUT_MS
      ),
      fetchJsonWithTimeout(
        `https://fapi.binance.com/fapi/v1/premiumIndex?symbol=${PAIR}`,
        PRICE_FETCH_TIMEOUT_MS
      ),
    ]);
    const px = parseFloat((lastTrade && lastTrade.price) || 0);
    if (Number.isFinite(px) && px > 0) {
      livePrice = px;
    }
    const markPx = parseFloat((premiumIndex && premiumIndex.markPrice) || 0);
    if (Number.isFinite(markPx) && markPx > 0) {
      liveMarkPrice = markPx;
    }
  }

  async function fetchFourHourKlines() {
    const now = Date.now();
    if (KLINES_4H.length && now - KLINES_4H_FETCH_TS < KLINE_REFRESH_INTERVAL_MS) return;
    const data = await fetchJsonWithTimeout(
      `https://fapi.binance.com/fapi/v1/klines?symbol=${PAIR}&interval=4h&limit=32`,
      KLINE_FETCH_TIMEOUT_MS
    );
    if (!Array.isArray(data)) return;
    const parsed = data
      .map((row) => ({
        ts: Number(row && row[0]),
        open: Number(row && row[1]),
        high: Number(row && row[2]),
        low: Number(row && row[3]),
        close: Number(row && row[4]),
      }))
      .filter((row) => Number.isFinite(row.open) && Number.isFinite(row.high) && Number.isFinite(row.low) && Number.isFinite(row.close));
    if (!parsed.length) return;
    KLINES_4H = parsed;
    KLINES_4H_FETCH_TS = now;
  }

  // ── 同時更新倉位資料與即時價格 ──
  async function refresh() {
    if (refreshInFlight) {
      refreshQueued = true;
      return;
    }
    refreshInFlight = true;
    try {
      await Promise.all([fetchPositionData(), fetchPrice(), fetchFourHourKlines()]);
      render();
    } finally {
      refreshInFlight = false;
      if (refreshQueued) {
        refreshQueued = false;
        void refresh();
      }
    }
  }

  // ── 計算未實現盈虧 ──
  function calcPnl(live) {
    const livePx = (Number.isFinite(Number(live)) && Number(live) > 0)
      ? Number(live)
      : ((Number.isFinite(Number(liveMarkPrice)) && Number(liveMarkPrice) > 0)
        ? Number(liveMarkPrice)
        : (BINANCE_MARK_PRICE > 0 ? BINANCE_MARK_PRICE : 0));
    const markPx = (Number.isFinite(Number(liveMarkPrice)) && Number(liveMarkPrice) > 0)
      ? Number(liveMarkPrice)
      : (BINANCE_MARK_PRICE > 0 ? BINANCE_MARK_PRICE : livePx);
    if (!livePx || !ENTRY) {
      return {
        gross_pct: 0,
        gross_usdt: 0,
        shown_pct: 0,
        shown_usdt: 0,
        net_pct: 0,
        net_usdt: 0,
        cost_usdt: 0,
        total_cost_rate: 0,
        source: "estimate",
      };
    }
    const raw = DIR === "long"
      ? (markPx - ENTRY) / ENTRY
      : (ENTRY - markPx) / ENTRY;
    const notional = POSITION_NOTIONAL_USDT > 0
      ? POSITION_NOTIONAL_USDT
      : (BINANCE_QTY > 0 && markPx > 0
        ? Math.max(0, BINANCE_QTY * markPx)
        : (POSITION_MARGIN_USDT > 0
          ? Math.max(0, POSITION_MARGIN_USDT * Math.max(1, LEV))
          : 0));
    const margin = POSITION_MARGIN_USDT > 0 ? POSITION_MARGIN_USDT : (notional > 0 ? notional / Math.max(1, LEV) : 0);
    const gross_usdt = BINANCE_QTY > 0
      ? (DIR === "long" ? (markPx - ENTRY) : (ENTRY - markPx)) * BINANCE_QTY
      : raw * notional;
    const gross_pct = margin > 0 ? (gross_usdt / margin) * 100 : raw * LEV * 100;
    const pnlSyncAgeSec = BINANCE_UNREALIZED_PNL_TS > 0
      ? Math.max(0, Math.floor(Date.now() / 1000) - BINANCE_UNREALIZED_PNL_TS)
      : Infinity;
    const hasExchangePnl = Number.isFinite(BINANCE_UNREALIZED_PNL_USDT) && pnlSyncAgeSec <= 20;
    const useExchangePnl = hasExchangePnl;
    const shown_usdt = useExchangePnl ? BINANCE_UNREALIZED_PNL_USDT : gross_usdt;
    const shown_pct = margin > 0 ? (shown_usdt / margin) * 100 : gross_pct;

    const total_cost_rate = Math.max(0, ROUND_TRIP_FEE_RATE) + Math.max(0, FUNDING_COST_RATE_EST);
    const cost_usdt = notional * total_cost_rate;
    const net_usdt = shown_usdt - cost_usdt;
    const net_pct = margin > 0 ? (net_usdt / margin) * 100 : shown_pct;
    return {
      gross_pct,
      gross_usdt,
      shown_pct,
      shown_usdt,
      net_pct,
      net_usdt,
      cost_usdt,
      total_cost_rate,
      mark_px: markPx,
      pnl_sync_age_sec: pnlSyncAgeSec,
      source: useExchangePnl ? "binance_sync" : "mark_price_estimate",
    };
  }

  function fmt_size(n) {
    const v = Number(n);
    if (!Number.isFinite(v)) return "0.0";
    return v.toFixed(1);

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function fmt_room_ratio(ratio) {
    const v = Number(ratio);
    if (!Number.isFinite(v) || v <= 0) return "0.0%";
    return `${(v * 100).toFixed(1)}%`;

  // ── 判斷 SL 是否已觸發 ──
  function slTriggered(live) {
    if (!live || !SL) return false;
    return DIR === "long" ? live <= SL : live >= SL;
  }

  // ── 格式化 ──
  function fmt(n, dec = 2) {
    return n.toLocaleString("zh-TW", {
      minimumFractionDigits: dec,
      maximumFractionDigits: dec

  function fmt_signed(n) {
    return (n >= 0 ? "+" : "") + n.toFixed(2);

    const v = Number(rate);
    if (!Number.isFinite(v)) return "-";

  function calcTotalAssetsUsdt() {
    const candidates = [
      Number(BINANCE_TOTAL_ASSETS_USDT),
      Number(BINANCE_SPOT_TOTAL_ASSETS_USDT) + Number(BINANCE_FUTURES_TOTAL_ASSETS_USDT),
      Number(ACCOUNT_MARGIN_BALANCE_USDT),
      Number(ACCOUNT_WALLET_BALANCE_USDT),
      Number(ACCOUNT_AVAILABLE_BALANCE_USDT),
    ];
    for (const value of candidates) {
      if (Number.isFinite(value) && value > 0) return value;

    return 0;

    const futuresAssets = Number.isFinite(Number(BINANCE_FUTURES_TOTAL_ASSETS_USDT)) && Number(BINANCE_FUTURES_TOTAL_ASSETS_USDT) > 0
      ? Number(BINANCE_FUTURES_TOTAL_ASSETS_USDT)
      : (Number.isFinite(Number(ACCOUNT_MARGIN_BALANCE_USDT)) ? Number(ACCOUNT_MARGIN_BALANCE_USDT) : 0);
    if (spotAssets > 0 || futuresAssets > 0) {
      return `現貨 ${fmt(spotAssets)} ｜ 合約 ${fmt(futuresAssets)}`;
    }
    return `錢包 ${fmt(ACCOUNT_WALLET_BALANCE_USDT)} ｜ 可用 ${fmt(ACCOUNT_AVAILABLE_BALANCE_USDT)}`;
  }

  function clamp(v, min, max) {
    return Math.min(Math.max(v, min), max);
  }

  function now_str() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    const ss = String(d.getSeconds()).padStart(2, "0");
    return `${hh}:${mm}:${ss}`;
  }

  function ts_str(ts) {
    const n = Number(ts);
    if (!Number.isFinite(n) || n <= 0) return "-";
    const d = new Date(n * 1000);
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    const ss = String(d.getSeconds()).padStart(2, "0");
    return `${hh}:${mm}:${ss}`;
  }

  function ts_full_str(ts) {
    const n = Number(ts);
    if (!Number.isFinite(n) || n <= 0) return "-";
    const d = new Date(n * 1000);
    const mon = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    return `${mon}/${day} ${hh}:${mm}`;
  }

  function fmt_elapsed(ts) {
    const n = Number(ts);
    if (!Number.isFinite(n) || n <= 0) return "-";
    const diff = Math.max(0, Math.floor(Date.now() / 1000) - n);
    const days = Math.floor(diff / 86400);
    const hours = Math.floor((diff % 86400) / 3600);
    const mins = Math.floor((diff % 3600) / 60);
    if (days > 0) return `${days}d ${hours}h`;
    if (hours > 0) return `${hours}h ${mins}m`;
    return `${mins}m`;
  }

  function fmt_countdown(ts) {
    const n = Number(ts);
    if (!Number.isFinite(n) || n <= 0) return "-";
    const diff = Math.floor(n - Date.now() / 1000);
    if (diff <= 0) return "已到期";
    const hours = Math.floor(diff / 3600);
    const mins = Math.floor((diff % 3600) / 60);
    if (hours > 0) return `${hours}h ${mins}m`;
    return `${mins}m`;
  }

  function calcTradePlanStats(live) {
    if (!ENTRY || !TP || !SL) {
      return {
        rr: 0,
        riskRate: 0,
        rewardRate: 0,
        roomToTpRate: 0,
        bufferToSlRate: 0,
        planProgress: 0,
      };
    }

    const isLong = DIR === "long";
    const livePx = (Number.isFinite(Number(live)) && Number(live) > 0)
      ? Number(live)
      : (BINANCE_MARK_PRICE > 0 ? BINANCE_MARK_PRICE : ENTRY);
    const riskRate = isLong
      ? Math.max((ENTRY - SL) / ENTRY, 0)
      : Math.max((SL - ENTRY) / ENTRY, 0);
    const rewardRate = isLong
      ? Math.max((TP - ENTRY) / ENTRY, 0)
      : Math.max((ENTRY - TP) / ENTRY, 0);
    const roomToTpRate = livePx > 0
      ? (isLong ? Math.max((TP - livePx) / livePx, 0) : Math.max((livePx - TP) / livePx, 0))
      : 0;
    const bufferToSlRate = livePx > 0
      ? (isLong ? Math.max((livePx - SL) / livePx, 0) : Math.max((SL - livePx) / livePx, 0))
      : 0;
    const rr = rewardRate / Math.max(riskRate, 1e-9);

    let planProgress = 0.5;
    if (isLong && TP > SL) {
      planProgress = clamp((livePx - SL) / (TP - SL), 0, 1);
    } else if (!isLong && SL > TP) {
      planProgress = clamp((SL - livePx) / (SL - TP), 0, 1);
    }

    return {
      rr,
      riskRate,
      rewardRate,
      roomToTpRate,
      bufferToSlRate,
      planProgress,
    };
  }

  function resolveNewsLocation(news) {
    const hasExplicitLat = news && news.lat !== null && news.lat !== undefined && news.lat !== "";
    const hasExplicitLon = news && news.lon !== null && news.lon !== undefined && news.lon !== "";
    const explicitLat = hasExplicitLat ? Number(news.lat) : NaN;
    const explicitLon = hasExplicitLon ? Number(news.lon) : NaN;
    if (hasExplicitLat && hasExplicitLon && Number.isFinite(explicitLat) && Number.isFinite(explicitLon)) {
      return {
        name: String((news && news.location) || "新聞位置"),
        lat: Math.max(-85, Math.min(85, explicitLat)),
        lon: Math.max(-180, Math.min(180, explicitLon)),
      };
    }

    const haystack = ` ${String((news && news.title) || "")} ${String((news && news.title_zh) || "")} ${String((news && news.source) || "")} `.toLowerCase();
    for (const hint of NEWS_LOCATION_HINTS) {
      if (hint.keys.some((key) => haystack.includes(String(key).toLowerCase()))) {
        return { name: hint.name, lat: hint.lat, lon: hint.lon };
      }
    }
    return null;
  }

  function projectNewsLocation(lat, lon) {
    return {
      x: Math.max(3, Math.min(97, ((lon + 180) / 360) * 100)),
      y: Math.max(6, Math.min(94, ((85 - lat) / 170) * 100)),
    };
  }

  function renderNewsMap(newsItems) {
    const located = (newsItems || [])
      .map((n) => ({ news: n, location: resolveNewsLocation(n) || NEWS_UNLOCATED_POINT }))
      .slice(0, 5);

    const grouped = [];
    const groupIndex = {};
    for (const item of located) {
      const key = `${item.location.name}|${item.location.lat.toFixed(2)},${item.location.lon.toFixed(2)}`;
      if (groupIndex[key] === undefined) {
        groupIndex[key] = grouped.length;
        grouped.push({ location: item.location, count: 0, biasScore: 0 });
      }
      const group = grouped[groupIndex[key]];
      group.count += 1;
      group.biasScore += item.news.bias > 0 ? 1 : (item.news.bias < 0 ? -1 : 0);
    }

    const markers = grouped.map((group) => {
      const point = projectNewsLocation(group.location.lat, group.location.lon);
      const cls = group.biasScore > 0 ? "tp" : (group.biasScore < 0 ? "sl" : "neutral");
      const labelText = `${group.location.name}${group.count > 1 ? ` x${group.count}` : ""}`;
      const label = escapeHtml(labelText);
      const labelX = point.x > 72 ? "translate(calc(-100% - 8px), -50%)" : "translate(8px, -50%)";
      return `
      <span class="news-marker ${cls}" style="left:${point.x.toFixed(2)}%;top:${point.y.toFixed(2)}%;" title="${label}"></span>
      <span class="news-marker-label" style="left:${point.x.toFixed(2)}%;top:${point.y.toFixed(2)}%;transform:${labelX};">${label}</span>`;
    }).join("");

    return `
    <div class="news-map" aria-label="新聞發生位置地圖">
      ${markers}
    </div>`;
  }

  function calcKlineSupportResistance(rows) {
    const sample = rows.slice(-20);
    if (!sample.length) return { support: 0, resistance: 0 };
    const percentile = (values, pctl) => {
      const sorted = values.filter((v) => Number.isFinite(v) && v > 0).sort((a, b) => a - b);
      if (!sorted.length) return 0;
      const idx = Math.max(0, Math.min(sorted.length - 1, Math.round((sorted.length - 1) * pctl)));
      return sorted[idx];
    };
    return {
      support: percentile(sample.map((row) => row.low), 0.15),
      resistance: percentile(sample.map((row) => row.high), 0.85),
    };
  }

  function renderFourHourKlineChart(live) {
    if (!KLINES_4H.length) {
      return `
    <div class="mini-kline">
      <div class="mini-kline-head">
        <div class="mini-kline-title">4H K 線圖</div>
        <div class="mini-kline-meta">${PAIR}</div>
      </div>
      <div class="mini-kline-empty">K 線載入中</div>
    </div>`;
    }

    const chartRows = KLINES_4H.slice(-28);
    const levels = calcKlineSupportResistance(chartRows);
    const high = Math.max(...chartRows.map((row) => row.high), TP || 0, SL || 0, ENTRY || 0, live || 0, levels.resistance || 0);
    const low = Math.min(...chartRows.map((row) => row.low), ...(TP > 0 ? [TP] : []), ...(SL > 0 ? [SL] : []), ...(ENTRY > 0 ? [ENTRY] : []), ...(live > 0 ? [live] : []), ...(levels.support > 0 ? [levels.support] : []));
    const pad = Math.max((high - low) * 0.08, high * 0.0005, 1);
    const top = high + pad;
    const bottom = low - pad;
    const width = 360;
    const height = 150;
    const leftPad = 8;
    const rightPad = 74;
    const plotWidth = width - leftPad - rightPad;
    const candleGap = 2;
    const candleSlot = plotWidth / chartRows.length;
    const bodyWidth = Math.max(4, candleSlot - candleGap);
    const yFor = (price) => {
      if (!Number.isFinite(price) || top <= bottom) return height / 2;
      return Math.max(2, Math.min(height - 2, ((top - price) / (top - bottom)) * height));
    };
    const lineFor = (price, cls, label) => {
      if (!Number.isFinite(price) || price <= 0) return "";
      const y = yFor(price);
      return `<line x1="${leftPad}" y1="${y.toFixed(2)}" x2="${(width - rightPad + 16)}" y2="${y.toFixed(2)}" class="${cls}" /><text x="${(width - 6)}" y="${Math.max(12, Math.min(height - 5, y + 4)).toFixed(2)}" text-anchor="end" class="${cls}-text">${label}</text>`;
    };
    const candles = chartRows.map((row, idx) => {
      const x = leftPad + idx * candleSlot + candleSlot / 2;
      const isUp = row.close >= row.open;
      const yHigh = yFor(row.high);
      const yLow = yFor(row.low);
      const yOpen = yFor(row.open);
      const yClose = yFor(row.close);
      const yBody = Math.min(yOpen, yClose);
      const bodyHeight = Math.max(2, Math.abs(yClose - yOpen));
      const cls = isUp ? "up" : "down";
      return `<line x1="${x.toFixed(2)}" y1="${yHigh.toFixed(2)}" x2="${x.toFixed(2)}" y2="${yLow.toFixed(2)}" class="wick ${cls}" /><rect x="${(x - bodyWidth / 2).toFixed(2)}" y="${yBody.toFixed(2)}" width="${bodyWidth.toFixed(2)}" height="${bodyHeight.toFixed(2)}" rx="1.2" class="body ${cls}" />`;
    }).join("");
    const last = chartRows[chartRows.length - 1];
    const changePct = chartRows[0].open > 0 ? ((last.close - chartRows[0].open) / chartRows[0].open) * 100 : 0;
    return `
    <div class="mini-kline">
      <div class="mini-kline-head">
        <div class="mini-kline-title">4H K 線圖</div>
        <div class="mini-kline-meta">${PAIR} ｜ ${fmt(levels.resistance)} ｜ ${fmt(levels.support)}</div>
      </div>
      <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-label="4H K 線圖">
        <style>
          .grid { stroke: rgba(255,255,255,0.06); stroke-width: 1; }
          .wick.up, .body.up { stroke: #e74c3c; fill: #e74c3c; }
          .wick.down, .body.down { stroke: #2ecc71; fill: #2ecc71; }
          .entry-line { stroke: rgba(255,255,255,0.45); stroke-width: 1; stroke-dasharray: 3 3; }
          .tp-line { stroke: rgba(46,204,113,0.55); stroke-width: 1; stroke-dasharray: 4 3; }
          .sl-line { stroke: rgba(231,76,60,0.55); stroke-width: 1; stroke-dasharray: 4 3; }
          .resistance-line { stroke: rgba(255,180,80,0.72); stroke-width: 1.3; }
          .support-line { stroke: rgba(72,198,255,0.72); stroke-width: 1.3; }
          .entry-line-text, .tp-line-text, .sl-line-text { fill: rgba(255,255,255,0.55); font-size: 8px; }
          .resistance-line-text { fill: rgba(255,205,130,0.92); font-size: 8px; font-weight: 700; }
          .support-line-text { fill: rgba(145,220,255,0.92); font-size: 8px; font-weight: 700; }
        </style>
        <line x1="${leftPad}" y1="37.5" x2="${width - rightPad + 16}" y2="37.5" class="grid" />
        <line x1="${leftPad}" y1="75" x2="${width - rightPad + 16}" y2="75" class="grid" />
        <line x1="${leftPad}" y1="112.5" x2="${width - rightPad + 16}" y2="112.5" class="grid" />
        ${candles}
        ${lineFor(levels.resistance, "resistance-line", fmt(levels.resistance))}
        ${lineFor(levels.support, "support-line", fmt(levels.support))}
        ${lineFor(ENTRY, "entry-line", "ENTRY")}
        ${lineFor(TP, "tp-line", "TP")}
        ${lineFor(SL, "sl-line", "SL")}
      </svg>
    </div>`;
  }

  // ── 渲染 UI ──
  function render() {
    if ((REMOTE_STATE_URL || REMOTE_WS_URL) && !HAS_VIEWER_AUTH) {
      renderAccessState("請先開一次面板", "請先從 Telegram 的 bot 按鈕開一次面板；之後同一台裝置可直接重開，不用每次重新驗證。");
      return;
    }
    if (!REMOTE_STATE_URL && !REMOTE_WS_URL && !POSITION_JSON_URLS.length) {
      renderAccessState("即時服務未設定", "目前頁面已停用公開靜態倉位快照。請從 Telegram 重新打開，或先設定 POSITION_PANEL_REALTIME_BASE_URL。");
      return;
    }
    if (PANEL_ACCESS_STATE === "unauthorized") {
      renderAccessState("授權失效", PANEL_ACCESS_MESSAGE || "請回 Telegram 重新開一次面板。");
      return;
    }
    if ((REMOTE_STATE_URL || REMOTE_WS_URL) && !HAS_POSITION_PAYLOAD) {
      renderAccessState("正在連線", PANEL_ACCESS_MESSAGE || "正在同步即時倉位資料…");
      return;
    }

    const totalAssetsUsdt = calcTotalAssetsUsdt();

    // 已平倉：顯示簡單的已平倉面板
    if (!POSITION_OPEN) {
      const lastDir = DIR === "long" ? "多單" : "空單";
      const hitClass = LAST_CLOSE_REASON === "TP" ? "tp" : (LAST_CLOSE_REASON === "SL" ? "sl" : "");
      const hitText = LAST_CLOSE_REASON === "TP"
        ? "✅ 止盈命中"
        : (LAST_CLOSE_REASON === "SL" ? "❌ 止損命中" : "📋 已平倉");
      const closePriceText = LAST_CLOSE_PRICE > 0 ? fmt(LAST_CLOSE_PRICE) : "-";
      const closeCandleText = (LAST_CLOSE_CANDLE_HIGH > 0 && LAST_CLOSE_CANDLE_LOW > 0)
        ? `${fmt(LAST_CLOSE_CANDLE_HIGH)} / ${fmt(LAST_CLOSE_CANDLE_LOW)}`
        : "-";
      document.getElementById("app").outerHTML = `
<div id="app">
  <div class="header">
    <div class="pair-info">
      <div class="eth-icon">◆</div>
      <div>
        <div class="pair-name">${PAIR}</div>
        <div class="pair-sub">${renderHeaderSubtitle()}</div>
      </div>
    </div>
    <div class="badge-open" style="background:#2a1a1a;color:#e74c3c;border-color:#e74c3c;">● 已平倉</div>
  </div>
  ${renderLatestNews()}
  ${renderTotalAssetsHero(totalAssetsUsdt)}
  <div class="card close-summary-card">
    <div class="close-hit ${hitClass}">${hitText}</div>
    <div class="close-summary-icon">📋</div>
    <div class="close-summary-title">目前無持倉</div>
    <div style="font-size:13px;color:#888;">平倉價：${closePriceText}</div>
    <div style="font-size:12px;color:#777;margin-top:4px;">1m 高/低：${closeCandleText}</div>
    <div style="font-size:12px;color:#777;margin-top:4px;">命中時間：${ts_str(LAST_CLOSE_TS)}</div>
  </div>
  <div class="card">
    <div class="card-title">上一筆設定</div>
    <div class="section-grid section-grid-compact">
      ${renderMetricCard("方向", lastDir, `槓桿 ${LEV}x`)}
      ${renderMetricCard("進場 / BE", `${ENTRY > 0 ? fmt(ENTRY) : "-"} / ${BINANCE_BREAK_EVEN_PRICE > 0 ? fmt(BINANCE_BREAK_EVEN_PRICE) : "-"}`)}
      ${renderMetricCard("TP / SL", `${TP > 0 ? fmt(TP) : "-"} / ${SL > 0 ? fmt(SL) : "-"}`)}
      ${renderMetricCard("成本估算", `${fmt_rate(TOTAL_COST_RATE_EST || (ROUND_TRIP_FEE_RATE + FUNDING_COST_RATE_EST), 3)}`, `手續費 ${fmt_rate(ROUND_TRIP_FEE_RATE, 3)} ｜ 資金費 ${fmt_rate(FUNDING_COST_RATE_EST, 3)}`)}
    </div>
  </div>
  <div class="update-time">最後更新：${now_str()} ｜ 倉位來源：${LAST_POSITION_SOURCE || "URL 參數"} ｜ 倉位時間：${ts_str(LAST_POSITION_TS)}</div>
</div>`;
      return;
    }

    const live = livePrice > 0 ? livePrice : BINANCE_MARK_PRICE;
    const pnl  = calcPnl(live);
    const sl_off = slTriggered(live);
    const isLong  = DIR === "long";

    const dirLabel = isLong ? "多單 ↑" : "空單 ↓";
    const dirClass = isLong ? "long" : "short";

    const pnlClass  = pnl.shown_pct >= 0 ? "profit" : "loss";

    const liveDiff  = live ? live - ENTRY : 0;
    const liveDiffStr = `${liveDiff >= 0 ? "↑" : "↓"} ${Math.abs(liveDiff).toFixed(2)} (${(liveDiff / ENTRY * 100).toFixed(2)}%)`;
    const plan = calcTradePlanStats(live);
    const capitalUsagePct = Number.isFinite(Number(SIZE)) ? Number(SIZE) : 0;
    const strategySizePct = Math.max(0, Number(POSITION_SIZE_RATIO) * 100);
    const maxSizePct = Math.max(0, Number(MAX_SIZE) * 100);
    const minSizePct = Math.max(0, Number(MIN_SIZE) * 100);
    const addRoomPct = Math.max(0, Number(SCALE_ADD_ROOM) * 100);
    const reduceRoomPct = Math.max(0, Number(SCALE_REDUCE_ROOM) * 100);
    const sizeBarBase = Math.max(maxSizePct, capitalUsagePct, 1);
    const sizeBarWidth = clamp((capitalUsagePct / sizeBarBase) * 100, 0, 100);
    const qtyEstimate = BINANCE_QTY > 0
      ? BINANCE_QTY
      : (live > 0 && POSITION_NOTIONAL_USDT > 0 ? POSITION_NOTIONAL_USDT / live : 0);
    const sizePressure = maxSizePct > 0 ? capitalUsagePct / maxSizePct : 0;
    const scaleTone = sizePressure > 1.02 ? "bad" : (sizePressure > 0.85 ? "warn" : "good");
    const planTone = plan.rr >= 1.5 ? "good" : (plan.rr >= 1.1 ? "warn" : "bad");
    const adjustText = LAST_ADJUST_TS > 0 ? `${ts_full_str(LAST_ADJUST_TS)} (${fmt_elapsed(LAST_ADJUST_TS)}前)` : "尚未調倉";
    const addRoomTone = SCALE_ADD_PAUSED ? "bad" : (addRoomPct >= 10 ? "good" : (addRoomPct > 0 ? "warn" : "bad"));
    const reduceRoomTone = reduceRoomPct >= 8 ? "good" : (reduceRoomPct > 0 ? "warn" : "bad");
    const addStatusText = SCALE_ADD_PAUSED
      ? `已暫停${SCALE_ADD_PAUSE_TS > 0 ? ` ｜ ${fmt_elapsed(SCALE_ADD_PAUSE_TS)}前` : ""}`
      : (addRoomPct > 0 ? "可補倉" : "已達上限");
    const addStatusDetail = SCALE_ADD_PAUSED
      ? (SCALE_ADD_PAUSE_REASON || "補倉暫停中")
      : `目前到上限還有 ${fmt_room_ratio(SCALE_ADD_ROOM)}`;
    const totalCostRate = TOTAL_COST_RATE_EST || (ROUND_TRIP_FEE_RATE + FUNDING_COST_RATE_EST);
    const fundingText = FUNDING_NEXT_TS > 0 ? `${ts_full_str(FUNDING_NEXT_TS)} ｜ ${fmt_countdown(FUNDING_NEXT_TS)}` : "-";
    const breakEvenText = BREAK_EVEN_ACTIVE
      ? `${BREAK_EVEN_TARGET > 0 ? fmt(BREAK_EVEN_TARGET) : fmt(SL)}${BREAK_EVEN_TS > 0 ? ` ｜ ${ts_full_str(BREAK_EVEN_TS)}` : ""}`
      : "待命";

    document.getElementById("app").outerHTML = `
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="pair-info">
      <div class="eth-icon">◆</div>
      <div>
        <div class="pair-name">${PAIR}</div>
        <div class="pair-sub">${renderHeaderSubtitle()}</div>
      </div>
    </div>
    <div class="badge-open">● 持倉中</div>
  </div>

  ${renderLatestNews()}

  ${renderFourHourKlineChart(live)}

  ${renderTotalAssetsHero(totalAssetsUsdt)}

  <!-- Direction + Size -->
  <div class="card">
    <div class="row">
      <div>
        <div class="label">方向</div>
        <div class="direction-val ${dirClass}">${dirLabel}</div>
      </div>
      <div style="text-align:right">
        <div class="label">目前倉位</div>
        <div class="size-val">${fmt_size(SIZE)}%</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" style="width:${sizeBarWidth}%"></div>
    </div>
    <div class="size-summary">
      <span>資金使用 <strong>${fmt_size(capitalUsagePct)}%</strong></span>
      <span>策略倉位 <strong>${fmt_size(strategySizePct)}%</strong></span>
    </div>
    <div class="section-grid">
      ${renderMetricCard("調倉區間", `${fmt_size(minSizePct)}% - ${fmt_size(maxSizePct)}%`, `策略倉位 ${fmt_size(strategySizePct)}%`)}
      ${renderMetricCard("持倉名義價值", POSITION_NOTIONAL_USDT > 0 ? `${fmt(POSITION_NOTIONAL_USDT)} USDT` : "-", POSITION_MARGIN_USDT > 0 ? `保證金 ${fmt(POSITION_MARGIN_USDT)} USDT` : "")}
      ${renderMetricCard(BINANCE_QTY > 0 ? "實際持倉數量" : "推估持倉數量", qtyEstimate > 0 ? `${qtyEstimate.toFixed(4)} ETH` : "-", `開倉 ${fmt_elapsed(OPEN_SINCE_TS)} ｜ 槓桿 ${LEV}x`)}
    </div>
  </div>

  <!-- Prices + PnL -->
  <div class="card">
    <div class="price-row">
      <div class="price-block">
        <div class="label">進場價</div>
        <div class="price-entry">${fmt(ENTRY)}</div>
      </div>
      <div class="price-block">
        <div class="label">現價</div>
        <div class="live-wrap">
          <span class="live-badge">LIVE</span>
        </div>
        <div class="price-live">${live ? fmt(live) : "─"}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">${live ? liveDiffStr : ""}</div>
      </div>
      <div class="pnl-block">
        <div class="label">未實現盈虧</div>
        <div class="pnl-pct ${pnlClass}">${live ? fmt_signed(pnl.shown_pct) + "%" : "─"}</div>
        <div class="pnl-usdt ${pnlClass}">${live ? fmt_signed(pnl.shown_usdt) + " USDT" : ""}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">
          ${live ? (pnl.source === "binance_sync"
            ? `Binance 同步 ${fmt_signed(pnl.shown_usdt)} | 成本後 ${fmt_signed(pnl.net_usdt)}`
            : `Mark Price 估算 ${fmt_signed(pnl.gross_usdt)} | 成本後 ${fmt_signed(pnl.net_usdt)}`) : ""}
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section-grid">
      ${renderMetricCard("毛盈虧", `${fmt_signed(pnl.shown_pct)}%`, `${fmt_signed(pnl.shown_usdt)} USDT ｜ ${pnl.source === "binance_sync" ? "Binance 同步" : "Mark Price 估算"}`)}
      ${renderMetricCard("成本後盈虧", `${fmt_signed(pnl.net_pct)}%`, `${fmt_signed(pnl.net_usdt)} USDT ｜ 成本 -${pnl.cost_usdt.toFixed(2)} USDT`)}
    </div>
    <div class="divider"></div>
    <div class="card-title">交易計畫</div>
    <div class="tp-sl-row">
      <div class="tp-box">
        <div class="tp-header">
          <span class="tp-icon">🎯</span>
          <span class="tp-label">止盈 (TP)</span>
        </div>
        <div class="tp-val">${fmt(TP)}</div>
        <div style="font-size:11px;color:#888;">剩餘空間 ${fmt_rate(plan.roomToTpRate, 2)}</div>
      </div>
      <div class="sl-box">
        <div class="tp-header">
          <span class="tp-icon">🛑</span>
          <span class="tp-label">止損 (SL)</span>
        </div>
        <div class="tp-val">${fmt(SL)}</div>
        <div class="sl-status ${sl_off ? "sl-triggered" : "sl-active"}">
          ${sl_off ? "⚠️ 已觸發" : `✅ 緩衝 ${fmt_rate(plan.bufferToSlRate, 2)}`}
        </div>
      </div>
    </div>
    <div class="section-grid">
      ${renderMetricCard("計畫 RR", `${plan.rr ? plan.rr.toFixed(2) : "-"}`, `風險 ${fmt_rate(plan.riskRate, 2)} ｜ 報酬 ${fmt_rate(plan.rewardRate, 2)}`)}
      ${renderMetricCard("BE / 即時價差", BINANCE_BREAK_EVEN_PRICE > 0 ? `${fmt(BINANCE_BREAK_EVEN_PRICE)}` : "-", live ? liveDiffStr : "")}
    </div>
    <div class="range-track">
      <div class="range-fill"></div>
      <div class="range-marker" style="left:${(plan.planProgress * 100).toFixed(2)}%"></div>
    </div>
    <div class="range-labels">
      <span>SL ${fmt(SL)}</span>
      <span>進場 ${fmt(ENTRY)}</span>
      <span>TP ${fmt(TP)}</span>
    </div>
    <div class="status-row">
      <span class="status-chip ${planTone}">計畫品質 RR ${plan.rr ? plan.rr.toFixed(2) : "-"}</span>
      <span class="status-chip ${sl_off ? "bad" : "good"}">${sl_off ? "止損區已碰觸" : "止損仍有緩衝"}</span>
      <span class="status-chip ${BREAK_EVEN_ACTIVE ? "good" : "info"}">自動保本 ${breakEvenText}</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">調倉與成本</div>
    <div class="section-grid">
      ${renderMetricCard("可補倉空間", fmt_room_ratio(SCALE_ADD_ROOM), addStatusDetail)}
      ${renderMetricCard("可減倉空間", fmt_room_ratio(SCALE_REDUCE_ROOM), `底倉下限 ${fmt_size(minSizePct)}%`)}
      ${renderMetricCard("補倉 / 減倉次數", `${ADD_COUNT} / ${REDUCE_COUNT}`, `下限 ${fmt_size(minSizePct)}% ｜ 上限 ${fmt_size(maxSizePct)}%`)}
      ${renderMetricCard("最近調整", LAST_ADJUST_TS > 0 ? ts_full_str(LAST_ADJUST_TS) : "-", LAST_ADJUST_TS > 0 ? `${fmt_elapsed(LAST_ADJUST_TS)}前` : "尚未補/減倉")}
      ${renderMetricCard("手續費 / 資金費", `${fmt_rate(ROUND_TRIP_FEE_RATE, 3)} / ${fmt_rate(FUNDING_COST_RATE_EST, 3)}`, `Funding ${fmt_rate(FUNDING_RATE, 4)} ｜ 評估 ${COST_EVAL_HOLD_HOURS.toFixed(1)}h`)}
      ${renderMetricCard("總成本估算", fmt_rate(totalCostRate, 3), `Next funding ${fundingText}`)}
    </div>
    <div class="status-row">
      <span class="status-chip ${addRoomTone}">補倉狀態 ${addStatusText}</span>
      <span class="status-chip ${reduceRoomTone}">減倉空間 ${fmt_room_ratio(SCALE_REDUCE_ROOM)}</span>
      <span class="status-chip ${scaleTone}">倉位壓力 ${maxSizePct > 0 ? `${(sizePressure * 100).toFixed(1)}%` : "-"}</span>
    </div>
    <div class="section-note">
      成本後盈虧已把手續費與持倉期間資金費估算納入。若交易所未回傳最新盈虧，前端會退回即時估算。
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <span>盈利增加 → 紅色</span>｜<span>觸發止損 → 綠色</span>
  </div>

  <div class="update-time">最後更新：${now_str()} ｜ 倉位來源：${LAST_POSITION_SOURCE || "URL 參數"} ｜ 倉位時間：${ts_str(LAST_POSITION_TS)}</div>
</div>`;
  }

  // ── 啟動 ──
  connectRealtimeSocket();
  void fetchPerformanceSummary().then(render);
  refresh();
  setInterval(refresh, PANEL_REFRESH_INTERVAL_MS);
  setInterval(checkAppVersion, APP_VERSION_CHECK_INTERVAL_MS);

  // 頁面重新可見時（從背景切回）立刻刷新
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
      LAST_POSITION_TS = 0;  // 重置以強制重取最新資料
      refresh();
    }
  });
</script>
</body>
</html>
