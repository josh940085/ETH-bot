[inet_http_server]
port=127.0.0.1:19001

[supervisord]
logfile=%(here)s/.runtime/logs/supervisord.log
pidfile=%(here)s/.runtime/supervisord.pid
childlogdir=%(here)s/.runtime/logs
nodaemon=false

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=http://127.0.0.1:19001

[program:eth-bot]
directory=%(here)s
command=%(here)s/.venv/bin/python -u %(here)s/program.py
autostart=true
autorestart=true
startsecs=5
startretries=3
stopsignal=TERM
stopwaitsecs=20
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=%(here)s/.runtime/logs/program.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=5
environment=PYTHONUNBUFFERED="1"

[program:panel-realtime]
directory=%(here)s
command=%(here)s/.venv/bin/python -u %(here)s/panel_realtime_server.py
autostart=true
autorestart=true
startsecs=3
startretries=3
stopsignal=TERM
stopwaitsecs=20
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=%(here)s/.runtime/logs/panel_realtime.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
environment=PYTHONUNBUFFERED="1"

[program:panel-tunnel]
directory=%(here)s
command=%(here)s/.venv/bin/python -u %(here)s/panel_tunnel.py
autostart=true
autorestart=true
startsecs=3
startretries=10
stopsignal=TERM
stopwaitsecs=20
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=%(here)s/.runtime/logs/cloudflared-panel.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
environment=PYTHONUNBUFFERED="1"

[program:mlx-agent]
directory=%(here)s
command=%(here)s/.venv/bin/python -u %(here)s/mlx_agent.py
autostart=true
autorestart=true
startsecs=10
startretries=3
stopsignal=TERM
stopwaitsecs=30
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=%(here)s/.runtime/logs/mlx-agent.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=3
environment=PYTHONUNBUFFERED="1"

[program:n8n]
directory=%(here)s
command=%(here)s/.venv/bin/python -u %(here)s/n8n_service.py start
autostart=true
autorestart=true
startsecs=10
startretries=3
stopsignal=TERM
stopwaitsecs=30
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=%(here)s/.runtime/logs/n8n.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
environment=PYTHONUNBUFFERED="1"
